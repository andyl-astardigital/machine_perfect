<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../../logo.svg" />
  <title>machine_perfect — test suite</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; padding: 20px; background: #4c1d95; color: #e9d5ff; }
    h1 { font-size: 18px; margin-bottom: 4px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .header img { width: 28px; height: 28px; border-radius: 6px; }
    .header h1 { font-size: 18px; }
    .header .gold { color: #fbbf24; }
    #summary { margin-bottom: 16px; padding: 8px 12px; border-radius: 6px; font-weight: bold; }
    .pass-bg { background: #0d3320; color: #4ade80; }
    .fail-bg { background: #3b0d0d; color: #f87171; }
    .result { padding: 4px 8px; border-left: 3px solid; margin-bottom: 2px; border-radius: 0 4px 4px 0; }
    .result.pass { border-color: #22c55e; color: #86efac; }
    .result.fail { border-color: #ef4444; color: #fca5a5; background: #2a0a0a; }
    .result .detail { color: #f87171; font-size: 11px; margin-top: 2px; }
    .group { margin-top: 12px; margin-bottom: 4px; font-weight: bold; color: #fbbf24; font-size: 14px; }
    #fixture-area { position: absolute; left: -9999px; top: -9999px; }
    .mp-enter-active, .mp-leave-active { transition: opacity 0.05s; }
    .mp-enter-from { opacity: 0; }
    .mp-leave-to { opacity: 0; }
  </style>
</head>
<body>
  <div class="header">
    <img src="../../logo.svg" alt="" />
    <h1>machine_perfect <span class="gold">v0.5</span> — test suite</h1>
  </div>
  <div id="summary">Running...</div>
  <div id="results"></div>
  <div id="fixture-area"></div>
  <script src="../engine.js"></script>
  <script src="../browser.js"></script>
  <script>
    var _tests = [], _g = '', _p = 0, _f = 0;
    var _r = document.getElementById('results'), _fa = document.getElementById('fixture-area');
    function group(n) { _g = n; }
    var _currentTest = null;
    function test(n, fn) { _tests.push({ n: _g + ' > ' + n, fn: fn, perf: '' }); }
    function perf(label, ms) { if (_currentTest) _currentTest.perf += ((_currentTest.perf ? ', ' : '') + label + ': ' + ms.toFixed(1) + 'ms'); }
    function assert(c, m) { if (!c) throw new Error(m || 'Assertion failed'); }
    function eq(a, b, m) { if (a !== b) throw new Error((m||'') + ': ' + JSON.stringify(a) + ' !== ' + JSON.stringify(b)); }
    function has(s, sub) { if (String(s).indexOf(sub) === -1) throw new Error('"' + s + '" missing "' + sub + '"'); }
    function fixture(h) { var d = document.createElement('div'); d.innerHTML = h; _fa.appendChild(d); MachinePerfect.init(d); return d; }
    function click(e) { e.dispatchEvent(new MouseEvent('click', { bubbles: true })); }
    function type(e, v) { e.value = v; e.dispatchEvent(new Event('input', { bubbles: true })); }
    function check(e, c) { e.checked = c; e.dispatchEvent(new Event('input', { bubbles: true })); }
    function selVal(e, v) { e.value = v; e.dispatchEvent(new Event('change', { bubbles: true })); }
    function submit(f) { f.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true })); }
    function keydown(e, k) { e.dispatchEvent(new KeyboardEvent('keydown', { key: k, bubbles: true })); }
    function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }
    async function run() {
      var lg = '';
      for (var i = 0; i < _tests.length; i++) {
        var t = _tests[i], gn = t.n.split(' > ')[0];
        if (gn !== lg) { var g = document.createElement('div'); g.className = 'group'; g.textContent = gn; _r.appendChild(g); lg = gn; }
        _fa.innerHTML = '';
        _currentTest = t;
        var row = document.createElement('div');
        try { await t.fn(); _p++; row.className = 'result pass'; row.textContent = '\u2713 ' + t.n + (t.perf ? ' (' + t.perf + ')' : ''); }
        catch (e) { _f++; row.className = 'result fail'; row.innerHTML = '\u2717 ' + t.n + '<div class="detail">' + e.message + '</div>'; }
        _r.appendChild(row);
      }
      var s = document.getElementById('summary');
      s.textContent = _p + ' passed, ' + _f + ' failed, ' + (_p + _f) + ' total';
      s.className = _f === 0 ? 'pass-bg' : 'fail-bg';
    }

    // ══════════════════════════════════════════════════════════════════
    //  S-EXPRESSION ENGINE
    // ══════════════════════════════════════════════════════════════════

    group('S-expressions');

    test('bare word resolves to context value', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"x":42}\'><span mp-text="x" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, '42');
    });

    test('dotted path resolves', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"user":{"name":"A"}}\'><span mp-text="user.name" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, 'A');
    });

    test('$state resolves to current state', function () {
      var el = fixture('<div mp="t"><div mp-state="hello"><span mp-text="$state" id="o"></span></div></div>');
      eq(el.querySelector('#o').textContent, 'hello');
    });

    test('(+ a b) arithmetic', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"a":2,"b":3}\'><span id="o"><mp-text>(+ a b)</mp-text></span></div>');
      eq(el.querySelector('#o').textContent, '5');
    });

    test('(str a b) concatenation', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"n":5}\'><span id="o"><mp-text>(str n \' items\')</mp-text></span></div>');
      eq(el.querySelector('#o').textContent, '5 items');
    });

    test('(> a b) comparison', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"n":10}\'><div id="a"><mp-show>(> n 5)</mp-show>Y</div><div id="b"><mp-show>(> n 20)</mp-show>N</div></div>');
      assert(!el.querySelector('#a').hidden, '>5 should show');
      assert(el.querySelector('#b').hidden, '>20 should hide');
    });

    test('(and) (or) (not) logic', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"a":true,"b":false}\'><div id="o"><mp-show>(and a (not b))</mp-show>Y</div></div>');
      assert(!el.querySelector('#o').hidden);
    });

    test('(if cond then else)', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"on":true}\'><span id="o"><mp-text>(if on \'YES\' \'NO\')</mp-text></span></div>');
      eq(el.querySelector('#o').textContent, 'YES');
    });

    test('(when cond value)', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"ok":true}\'><span id="o"><mp-text>(when ok \'good\')</mp-text></span></div>');
      eq(el.querySelector('#o').textContent, 'good');
    });

    test('(count items) collection length', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"items":[1,2,3]}\'><span id="o"><mp-text>(count items)</mp-text></span></div>');
      eq(el.querySelector('#o').textContent, '3');
    });

    test('(set! x val) mutation', function () {
      var el = fixture(
        '<div mp="t" mp-ctx=\'{"x":0}\'>' +
        '<div mp-state="a">' +
        '<mp-transition event="set-x" to="a"><mp-action>(set! x 99)</mp-action></mp-transition>' +
        '<button mp-to="set-x" id="btn">Go</button>' +
        '<span mp-text="x" id="o"></span>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('#o').textContent, '99');
    });

    test('(inc! x) mutation', function () {
      var el = fixture(
        '<div mp="t" mp-ctx=\'{"n":0}\'>' +
        '<div mp-state="a">' +
        '<mp-transition event="increment" to="a"><mp-action>(inc! n)</mp-action></mp-transition>' +
        '<button mp-to="increment" id="btn">+</button>' +
        '<span mp-text="n" id="o"></span>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      click(el.querySelector('#btn'));
      eq(el.querySelector('#o').textContent, '2');
    });

    test('(do expr1 expr2) sequences', function () {
      var el = fixture(
        '<div mp="t" mp-ctx=\'{"a":0,"b":0}\'>' +
        '<div mp-state="s">' +
        '<mp-transition event="set-ab" to="s"><mp-action>(do (set! a 1) (set! b 2))</mp-action></mp-transition>' +
        '<button mp-to="set-ab" id="btn">Go</button>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.ctx.a, 1);
      eq(el.querySelector('[mp]')._mp.ctx.b, 2);
    });

    test('(push! arr val) array mutation', function () {
      var el = fixture(
        '<div mp="t" mp-ctx=\'{"items":[]}\'>' +
        '<div mp-state="a">' +
        '<mp-transition event="add-item" to="a"><mp-action>(push! items 1)</mp-action></mp-transition>' +
        '<button mp-to="add-item" id="btn">+</button>' +
        '</div></div>'
      );
      click(el.querySelector('#btn')); click(el.querySelector('#btn')); click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.ctx.items.length, 3);
    });

    test('(toggle! flag) boolean flip', function () {
      var el = fixture(
        '<div mp="t" mp-ctx=\'{"on":false}\'>' +
        '<div mp-state="a">' +
        '<mp-transition event="toggle-on" to="a"><mp-action>(toggle! on)</mp-action></mp-transition>' +
        '<button mp-to="toggle-on" id="btn">T</button>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.ctx.on, true);
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.ctx.on, false);
    });

    test('(fn [x] body) lambda with filter — Clojure arg order', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"items":[1,2,3,4,5]}\'><span id="o"><mp-text>(count (filter (fn [x] (> x 3)) items))</mp-text></span></div>');
      eq(el.querySelector('#o').textContent, '2');
    });

    test('(let [x 1 y 2] (+ x y)) local bindings — Clojure-style', function () {
      var el = fixture('<div mp="t"><span id="o"><mp-text>(let [x 10 y 20] (+ x y))</mp-text></span></div>');
      eq(el.querySelector('#o').textContent, '30');
    });

    test('keyword :name resolves to string', function () {
      var el = fixture(
        '<div mp="t" mp-ctx=\'{"items":[{"id":1},{"id":2}]}\'>' +
        '<div mp-state="a">' +
        '<mp-transition event="remove-one" to="a"><mp-action>(remove-where! items :id 1)</mp-action></mp-transition>' +
        '<button mp-to="remove-one" id="btn">-</button>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.ctx.items.length, 1);
      eq(el.querySelector('[mp]')._mp.ctx.items[0].id, 2);
    });

    test('(obj :key val) creates object', function () {
      var el = fixture(
        '<div mp="t" mp-ctx=\'{"items":[]}\'>' +
        '<div mp-state="a">' +
        '<mp-transition event="add-obj" to="a"><mp-action>(push! items (obj :name \'test\' :done false))</mp-action></mp-transition>' +
        '<button mp-to="add-obj" id="btn">+</button>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      var item = el.querySelector('[mp]')._mp.ctx.items[0];
      eq(item.name, 'test');
      eq(item.done, false);
    });

    test('nested expressions compose', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"items":[1,2,3]}\'><span id="o"><mp-text>(str (count items) \' of \' (+ (count items) 2))</mp-text></span></div>');
      eq(el.querySelector('#o').textContent, '3 of 5');
    });

    test('#() anonymous function shorthand', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"items":[1,2,3,4,5]}\'><span id="o"><mp-text>(count (filter #(> % 3) items))</mp-text></span></div>');
      eq(el.querySelector('#o').textContent, '2');
    });

    test('(->> x (f) (g)) thread-last macro', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"items":[1,2,3,4,5]}\'><span id="o"><mp-text>(->> items (filter #(> % 2)) (count))</mp-text></span></div>');
      eq(el.querySelector('#o').textContent, '3');
    });

    test('(-> x (f a) (g b)) thread-first macro', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"s":"hello world"}\'><span id="o"><mp-text>(-> s (upper) (trim))</mp-text></span></div>');
      eq(el.querySelector('#o').textContent, 'HELLO WORLD');
    });

    test('[x y z] vector creates array', function () {
      var el = fixture('<div mp="t"><span id="o"><mp-text>(count [1 2 3])</mp-text></span></div>');
      eq(el.querySelector('#o').textContent, '3');
    });

    test('sort-by with key function', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"items":[{"n":3},{"n":1},{"n":2}]}\'><span id="o"><mp-text>(get (first (sort-by #(get % :n) items)) :n)</mp-text></span></div>');
      eq(el.querySelector('#o').textContent, '1');
    });


    // ══════════════════════════════════════════════════════════════════
    //  CORE
    // ══════════════════════════════════════════════════════════════════

    group('Core');

    test('mp creates instance, first state active', function () {
      var el = fixture('<div mp="t"><div mp-state="a" id="a">A</div><div mp-state="b" id="b">B</div></div>');
      assert(el.querySelector('[mp]')._mp);
      assert(!el.querySelector('#a').hidden);
      assert(el.querySelector('#b').hidden);
    });

    test('mp-initial overrides', function () {
      var el = fixture('<div mp="t" mp-initial="b"><div mp-state="a" id="a">A</div><div mp-state="b" id="b">B</div></div>');
      assert(el.querySelector('#a').hidden);
      assert(!el.querySelector('#b').hidden);
    });

    test('mp-ctx sets context', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"n":42}\'><div mp-state="a">A</div></div>');
      eq(el.querySelector('[mp]')._mp.ctx.n, 42);
    });

    test('stateless machine with bindings', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"n":5}\'><span id="o"><mp-text>(* n 2)</mp-text></span></div>');
      eq(el.querySelector('#o').textContent, '10');
    });

    test('mp-ctx attribute syncs with live context after action', function () {
      var el = fixture(
        '<div mp="t" mp-ctx=\'{"count":0}\'>' +
        '<div mp-state="a">' +
        '<mp-transition event="increment" to="a"><mp-action>(inc! count)</mp-action></mp-transition>' +
        '<button mp-to="increment" id="btn">+</button>' +
        '</div></div>'
      );
      var machine = el.querySelector('[mp]');
      eq(JSON.parse(machine.getAttribute('mp-ctx')).count, 0, 'initial');
      click(el.querySelector('#btn'));
      eq(JSON.parse(machine.getAttribute('mp-ctx')).count, 1, 'after click');
      click(el.querySelector('#btn'));
      eq(JSON.parse(machine.getAttribute('mp-ctx')).count, 2, 'after second click');
    });

    test('mp-ctx attribute syncs with mp-model changes', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"name":""}\'><div mp-state="a"><input mp-model="name" id="inp" /></div></div>');
      var machine = el.querySelector('[mp]');
      var input = el.querySelector('#inp');
      input.value = 'Andrew';
      input.dispatchEvent(new Event('input', { bubbles: true }));
      eq(JSON.parse(machine.getAttribute('mp-ctx')).name, 'Andrew');
    });

    test('mp-ctx attribute syncs arrays after push!', function () {
      var el = fixture(
        '<div mp="t" mp-ctx=\'{"items":[]}\'>' +
        '<div mp-state="a">' +
        '<mp-transition event="add-pen" to="a"><mp-action>(push! items (obj :name \'Pen\'))</mp-action></mp-transition>' +
        '<button mp-to="add-pen" id="btn">Add</button>' +
        '</div></div>'
      );
      var machine = el.querySelector('[mp]');
      click(el.querySelector('#btn'));
      var ctx = JSON.parse(machine.getAttribute('mp-ctx'));
      eq(ctx.items.length, 1, 'one item');
      eq(ctx.items[0].name, 'Pen', 'item name');
    });

    test('mp-ctx in outerHTML contains live values after mp-model input', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"title":"","amount":0}\'><div mp-state="a"><input mp-model="title" id="inp" /><input mp-model="amount" type="number" id="amt" /></div></div>');
      var machine = el.querySelector('[mp]');
      var inp = el.querySelector('#inp');
      var amt = el.querySelector('#amt');
      inp.value = 'Test Order';
      inp.dispatchEvent(new Event('input', { bubbles: true }));
      amt.value = '500';
      amt.dispatchEvent(new Event('input', { bubbles: true }));
      // outerHTML should now have the synced values
      var html = machine.outerHTML;
      var ctxMatch = html.match(/mp-ctx="([^"]*)"/);
      assert(ctxMatch, 'outerHTML has mp-ctx');
      var ctx = JSON.parse(ctxMatch[1].replace(/&quot;/g, '"').replace(/&amp;/g, '&'));
      eq(ctx.title, 'Test Order', 'title in outerHTML');
      eq(ctx.amount, '500', 'amount in outerHTML');
    });

    test('mp-ctx sync excludes $ properties', function () {
      var el = fixture(
        '<div mp="t" mp-ctx=\'{"x":1}\'>' +
        '<div mp-state="a">' +
        '<mp-transition event="inc-x" to="a"><mp-action>(inc! x)</mp-action></mp-transition>' +
        '<button mp-to="inc-x" id="btn">+</button>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      var raw = el.querySelector('[mp]').getAttribute('mp-ctx');
      assert(raw.indexOf('$state') === -1, 'no $state in mp-ctx');
      assert(raw.indexOf('$el') === -1, 'no $el in mp-ctx');
      assert(raw.indexOf('$refs') === -1, 'no $refs in mp-ctx');
      assert(raw.indexOf('__mp') === -1, 'no __mp internals in mp-ctx');
    });


    // ══════════════════════════════════════════════════════════════════
    //  TRANSITIONS
    // ══════════════════════════════════════════════════════════════════

    group('Transitions');

    test('mp-to transitions on click', function () {
      var el = fixture('<div mp="t"><div mp-state="a"><button mp-to="b" id="btn">B</button></div><div mp-state="b" id="b">B</div></div>');
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.state, 'b');
    });

    test('self-transition with action', function () {
      var el = fixture(
        '<div mp="t" mp-ctx=\'{"n":0}\'>' +
        '<div mp-state="a">' +
        '<mp-transition event="increment" to="a"><mp-action>(inc! n)</mp-action></mp-transition>' +
        '<button mp-to="increment" id="btn">+</button>' +
        '<span mp-text="n" id="o"></span>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('#o').textContent, '1');
    });

    test('guard blocks when falsy', function () {
      var el = fixture(
        '<div mp="t" mp-ctx=\'{"ok":false}\'>' +
        '<div mp-state="a">' +
        '<mp-transition event="go" to="b"><mp-guard>(when ok true)</mp-guard></mp-transition>' +
        '<button mp-to="go" id="btn">Go</button>' +
        '</div><div mp-state="b">B</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.state, 'a');
    });

    test('guard s-expression in mp-to', function () {
      var el = fixture(
        '<div mp="t" mp-ctx=\'{"items":[1,2,3]}\'>' +
        '<div mp-state="a">' +
        '<mp-transition event="go" to="b"><mp-guard>(> (count items) 2)</mp-guard></mp-transition>' +
        '<button mp-to="go" id="btn">Go</button>' +
        '</div><div mp-state="b">B</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.state, 'b');
    });

    test('action s-expression in mp-to runs', function () {
      var el = fixture(
        '<div mp="t" mp-ctx=\'{"x":0}\'>' +
        '<div mp-state="a">' +
        '<mp-transition event="go" to="b"><mp-action>(set! x 99)</mp-action></mp-transition>' +
        '<button mp-to="go" id="btn">Go</button>' +
        '</div><div mp-state="b">B</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.ctx.x, 99);
    });

    test('unknown state warns', function () {
      var el = fixture('<div mp="t"><div mp-state="a"><button mp-to="zzz" id="btn">Go</button></div></div>');
      var w = false; var ow = console.warn; console.warn = function () { w = true; };
      click(el.querySelector('#btn')); console.warn = ow;
      eq(el.querySelector('[mp]')._mp.state, 'a');
      assert(w);
    });

    test('mp-state-change event fires', function () {
      var d = null;
      document.addEventListener('mp-state-change', function h(e) { d = e.detail; document.removeEventListener('mp-state-change', h); });
      var el = fixture('<div mp="ev"><div mp-state="a"><button mp-to="b" id="btn">B</button></div><div mp-state="b">B</div></div>');
      click(el.querySelector('#btn'));
      eq(d.prev, 'a'); eq(d.next, 'b');
    });


    // ══════════════════════════════════════════════════════════════════
    //  DATA BINDING
    // ══════════════════════════════════════════════════════════════════

    group('Binding');

    test('mp-text with s-expression', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"a":2,"b":3}\'><span id="o"><mp-text>(+ a b)</mp-text></span></div>');
      eq(el.querySelector('#o').textContent, '5');
    });

    test('mp-text updates after action', function () {
      var el = fixture(
        '<div mp="t" mp-ctx=\'{"n":0}\'>' +
        '<div mp-state="a">' +
        '<span mp-text="n" id="o"></span>' +
        '<mp-transition event="increment" to="a"><mp-action>(inc! n)</mp-action></mp-transition>' +
        '<button mp-to="increment" id="btn">+</button>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('#o').textContent, '1');
    });

    test('mp-model input', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"v":""}\'><div mp-state="a"><input mp-model="v" id="i" /><span mp-text="v" id="o"></span></div></div>');
      type(el.querySelector('#i'), 'hello');
      eq(el.querySelector('#o').textContent, 'hello');
    });

    test('mp-model radio button', function () {
      var el = fixture(
        '<div mp="t" mp-ctx=\'{"size":"medium"}\'><div mp-state="a">' +

    test('M10 — init() re-invocation does not reset already-live store values', function () {
      // Simulate what happens when HTMX swaps in new content and init() is called again.
      // The store was mutated at runtime; the re-init must not restore it to initial value.
      var root = document.createElement('div');
      root.innerHTML = '<mp-store name="m10test" value=\'{"count":0}\'></mp-store>';
      _fa.appendChild(root);
      MachinePerfect.init(root);
      // Store is initialised to {count:0}
      eq(MachinePerfect.store.m10test.count, 0, 'M10: store initialised to 0');
      // Simulate runtime mutation
      MachinePerfect.store.m10test.count = 99;
      eq(MachinePerfect.store.m10test.count, 99, 'M10: store mutated to 99');
      // Call init() again (as HTMX would after a swap)
      MachinePerfect.init(root);
      eq(MachinePerfect.store.m10test.count, 99, 'M10: re-init does not reset store to 0');
    });

      // Reorder: [C, A, B]

      inst.update();

      var reordered = el.querySelectorAll('.item');
      eq(reordered[0].textContent, 'C', 'M11: reordered — C first');

    test('Bug 21 — mp-each with duplicate key: items after the duplicate get correct data', function () {
      // If items = [A, A_dup, B] and A_dup is skipped (duplicate key),
      // the update loop must use newMap[key].item not items[i].
      // With items[i], after skipping A_dup, i=1 maps to B but items[1]=A_dup — wrong data.
      var el = fixture(
        '<div mp="bug21" mp-ctx=\'{"items":[{"k":"x","v":"A"},{"k":"y","v":"B"},{"k":"z","v":"C"}]}\'>' +
        '<div mp-state="s">' +
        '<template mp-key="k"><mp-each>items</mp-each>' +
        '<div class="item"><mp-text>v</mp-text></div></template>' +
        '</div></div>'
      );
      var initial = el.querySelectorAll('.item');
      eq(initial[0].textContent, 'A', 'Bug21: initial A');
      eq(initial[1].textContent, 'B', 'Bug21: initial B');
      eq(initial[2].textContent, 'C', 'Bug21: initial C');

      // Update with a duplicate key in the middle: [A, A_dup, B updated, C updated]
      // A_dup (k=x) is a duplicate — skipped. y and z items get new values.
      var inst = el.querySelector('[mp]')._mp;
      inst.ctx.items = [
        { k: 'x', v: 'A' },
        { k: 'x', v: 'A_DUP' }, // duplicate — skipped
        { k: 'y', v: 'B2' },
        { k: 'z', v: 'C2' }
      ];
      inst.update();

      // Three rendered items (duplicate skipped): A, B2, C2
      var updated = el.querySelectorAll('.item');
      eq(updated.length, 3, 'Bug21: 3 items rendered (duplicate skipped)');
      eq(updated[0].textContent, 'A', 'Bug21: first item still A');
      eq(updated[1].textContent, 'B2', 'Bug21: second item is B2 (not corrupted)');
      eq(updated[2].textContent, 'C2', 'Bug21: third item is C2 (not corrupted)');
    });

    test('mp-temporal (animate) leave completes via transitionend event, not just timeout', async function () {
      var el = fixture(
        '<div mp="anim-test" mp-ctx=\'{}\'>' +
        '<div mp-state="a" style="transition: opacity 0.05s">' +
        '<mp-temporal>(animate)</mp-temporal>' +
        '<mp-transition event="go" to="b"></mp-transition>' +
        '<span id="a-content">A</span>' +
        '</div>' +
        '<div mp-state="b"><span id="b-content">B</span></div>' +
        '</div>'
      );
      var inst = el.querySelector('[mp]')._mp;
      eq(inst.state, 'a', 'starts in a');

      inst.to('b');

      // The leave animation adds mp-leave-from, mp-leave-active classes.
      // After the transition completes (via transitionend event), the old
      // state is hidden. Wait for the animation to finish.
      await new Promise(function (resolve) { setTimeout(resolve, 150); });

      eq(inst.state, 'b', 'transitioned to b');
      var aEl = el.querySelector('[mp-state="a"]');
      // After leave animation, the old state should be hidden
      eq(aEl.hidden, true, 'state a hidden after leave animation');
      assert(!aEl.classList.contains('mp-leave-active'), 'leave-active class removed after transition');
    });
