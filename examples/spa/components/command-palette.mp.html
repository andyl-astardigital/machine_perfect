<!-- command-palette — Ctrl+K quick resort search.
     States: closed → open
     Context: { query }
     Emits: cmd-select -->
<template mp-define="command-palette">
  <div mp-state="closed"></div>
  <div mp-state="open" class="fixed inset-0 z-50 flex items-start justify-center pt-24">
    <mp-temporal>(animate)</mp-temporal>
    <mp-init>(set! query '')</mp-init>
    <mp-transition event="select" to="closed">
      <mp-action>(emit cmd-select)</mp-action>
    </mp-transition>
    <div class="fixed inset-0 bg-black/60">
      <mp-on event="click">(to closed)</mp-on>
    </div>
    <div class="card bg-base-100 shadow-2xl z-10 w-[500px] max-w-[90vw] max-h-[60vh] flex flex-col">
      <div class="p-3 border-b border-base-300">
        <input mp-ref="cmdInput" mp-model="query" type="text"
               placeholder="Search resorts... (Esc to close)"
               class="input input-bordered input-sm w-full">
          <mp-on event="keydown">(when (= (get $event :key) 'Escape') (to closed))</mp-on>
        </input>
      </div>
      <div class="overflow-y-auto p-2 flex-1">
        <template><mp-each>(->> $store.resorts (filter #(contains? (lower (get % :name)) (lower query))) (take 10))</mp-each>
          <button mp-to="select" class="btn btn-ghost btn-sm btn-block justify-start gap-2 font-normal">
            <img class="w-5 h-3 rounded-sm object-cover">
              <mp-bind attr="src">(str 'https://flagcdn.com/w40/' code '.png')</mp-bind>
            </img>
            <span><mp-text>name</mp-text></span>
            <span class="ml-auto text-xs font-mono">
              <mp-class>(if (> snow 0) 'text-info' 'text-base-content/30')</mp-class>
              <mp-text>(if (> snow 0) (str snow 'cm') 'No snow')</mp-text>
            </span>
          </button>
        </template>
      </div>
      <div class="p-2 border-t border-base-300 text-xs text-base-content/40 text-center">
        <kbd class="kbd kbd-xs">↵</kbd> select · <kbd class="kbd kbd-xs">esc</kbd> close
      </div>
    </div>
  </div>
</template>
