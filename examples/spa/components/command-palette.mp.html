<!-- command-palette — Ctrl+K quick resort search.
     States: closed → open
     Context: { query }
     Emits: cmd-select -->
<template mp-define="command-palette">
  <div mp-state="closed"></div>
  <div mp-state="open" mp-temporal="(animate)" mp-init="(set! query '')"
       class="fixed inset-0 z-50 flex items-start justify-center pt-24">
    <div class="fixed inset-0 bg-black/60" mp-on:click="(to closed)"></div>
    <div class="card bg-base-100 shadow-2xl z-10 w-[500px] max-w-[90vw] max-h-[60vh] flex flex-col">
      <div class="p-3 border-b border-base-300">
        <input mp-ref="cmdInput" mp-model="query" type="text"
               placeholder="Search resorts... (Esc to close)"
               mp-on:keydown="(when (= (get $event :key) 'Escape') (to closed))"
               class="input input-bordered input-sm w-full" />
      </div>
      <div class="overflow-y-auto p-2 flex-1">
        <template mp-each="(->> $store.resorts (filter #(contains? (lower (get % :name)) (lower query))) (take 10))">
          <button mp-to="(do (emit cmd-select) (to closed))"
                  class="btn btn-ghost btn-sm btn-block justify-start gap-2 font-normal">
            <img mp-bind-src="(str 'https://flagcdn.com/w40/' code '.png')" class="w-5 h-3 rounded-sm object-cover" />
            <span mp-text="name"></span>
            <span class="ml-auto text-xs font-mono" mp-class="(if (> snow 0) 'text-info' 'text-base-content/30')" mp-text="(if (> snow 0) (str snow 'cm') 'No snow')"></span>
          </button>
        </template>
      </div>
      <div class="p-2 border-t border-base-300 text-xs text-base-content/40 text-center">
        <kbd class="kbd kbd-xs">↵</kbd> select · <kbd class="kbd kbd-xs">esc</kbd> close
      </div>
    </div>
  </div>
</template>
