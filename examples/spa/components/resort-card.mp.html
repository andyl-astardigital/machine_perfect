<!-- resort-card — Reusable visual component for displaying a ski resort.

     Context: { name, code, alt, top, region, country, temp, snow, wind, weather, img }
     Slot: actions (★ Save, +⇄ Compare, Remove — depends on context)

     Used in: browse grid, compare grid, saved grid — SAME component, THREE uses.
-->
<template mp-define="resort-card">
  <div mp-state="display" class="card bg-base-100 border border-base-300 shadow-sm overflow-hidden resort-card">
    <div class="relative">
      <div class="h-28 bg-gradient-to-br from-blue-900 to-indigo-900 flex items-end p-3 bg-cover bg-center"
           mp-bind-style="(if (and img (> (count img) 0)) (str 'background-image:linear-gradient(to top,rgba(0,0,0,.6),transparent),url(' img ')') '')">
        <div class="flex items-center gap-2">
          <img mp-bind-src="(str 'https://flagcdn.com/w40/' code '.png')" class="w-5 h-3 rounded-sm object-cover shadow" />
          <h3 mp-text="name" class="font-bold text-sm text-white truncate drop-shadow"></h3>
        </div>
      </div>
      <div class="absolute top-2 right-2">
        <div mp-class="(cond (nil? snow) 'badge-warning' (> snow 0) 'badge-info' true 'badge-ghost')"
             class="badge badge-sm font-mono shadow">
          <span mp-text="(cond (nil? snow) '...' (< snow 0) '...' (> snow 0) (str snow 'cm') true 'No snow')"></span>
        </div>
      </div>
    </div>
    <div class="card-body p-3 gap-1">
      <div class="flex justify-between text-xs">
        <span class="text-base-content/60" mp-text="(str alt 'm – ' top 'm')"></span>
        <span class="font-mono"
              mp-class="(if (nil? temp) 'text-base-content/30' (if (< temp 0) 'text-info' 'text-warning'))"
              mp-text="(if (nil? temp) '...' (str temp '°C'))"></span>
      </div>
      <p class="text-xs text-base-content/40" mp-text="(str region ' · ' (or weather country))"></p>
      <mp-slot name="actions"></mp-slot>
    </div>
  </div>
</template>
<style>.resort-card{transition:transform .2s,box-shadow .2s}.resort-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.3)}</style>
