<!-- toast — Auto-dismissing notification with optional custom content.
     States: idle → show (auto-dismiss via mp-temporal)
     Context: { message }
     Slot: default (optional extra content after message) -->
<template mp-define="toast">
  <div mp-state="idle"></div>
  <div mp-state="show" class="alert alert-success shadow-lg text-sm gap-2">
    <mp-temporal>(after 2500 (to idle))</mp-temporal>
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
    </svg>
    <span><mp-text>message</mp-text></span>
    <mp-slot></mp-slot>
  </div>
</template>
