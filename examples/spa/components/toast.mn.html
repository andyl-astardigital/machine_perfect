<!-- toast — Auto-dismissing notification with optional custom content.
     States: idle → show (auto-dismiss via mn-temporal)
     Context: { message }
     Slot: default (optional extra content after message) -->
<template mn-define="toast">
  <div mn-state="idle"></div>
  <div mn-state="show" class="alert alert-success shadow-lg text-sm gap-2">
    <mn-temporal>(after 2500 (to idle))</mn-temporal>
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
    </svg>
    <span><mn-text>message</mn-text></span>
    <mn-slot></mn-slot>
  </div>
</template>
