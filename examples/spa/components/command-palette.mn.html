<!-- command-palette — Ctrl+K quick resort search.
     States: closed → open
     Context: { query }
     Emits: cmd-select -->
<template mn-define="command-palette">
  <div mn-state="closed"></div>
  <div mn-state="open" class="fixed inset-0 z-50 flex items-start justify-center pt-24">
    <mn-temporal>(animate)</mn-temporal>
    <mn-init>(set! query '')</mn-init>
    <mn-transition event="select" to="closed">
      <mn-action>(emit cmd-select)</mn-action>
    </mn-transition>
    <div class="fixed inset-0 bg-black/60">
      <mn-on event="click">(to closed)</mn-on>
    </div>
    <div class="card bg-base-100 shadow-2xl z-10 w-[500px] max-w-[90vw] max-h-[60vh] flex flex-col">
      <div class="p-3 border-b border-base-300">
        <input mn-ref="cmdInput" mn-model="query" type="text"
               placeholder="Search resorts... (Esc to close)"
               class="input input-bordered input-sm w-full">
          <mn-on event="keydown">(when (= (get $event :key) 'Escape') (to closed))</mn-on>
        </input>
      </div>
      <div class="overflow-y-auto p-2 flex-1">
        <template><mn-each>(->> $store.resorts (filter #(contains? (lower (get % :name)) (lower query))) (take 10))</mn-each>
          <button mn-to="select" class="btn btn-ghost btn-sm btn-block justify-start gap-2 font-normal">
            <img class="w-5 h-3 rounded-sm object-cover">
              <mn-bind attr="src">(str 'https://flagcdn.com/w40/' code '.png')</mn-bind>
            </img>
            <span><mn-text>name</mn-text></span>
            <span class="ml-auto text-xs font-mono">
              <mn-class>(if (> snow 0) 'text-info' 'text-base-content/30')</mn-class>
              <mn-text>(if (> snow 0) (str snow 'cm') 'No snow')</mn-text>
            </span>
          </button>
        </template>
      </div>
      <div class="p-2 border-t border-base-300 text-xs text-base-content/40 text-center">
        <kbd class="kbd kbd-xs">↵</kbd> select · <kbd class="kbd kbd-xs">esc</kbd> close
      </div>
    </div>
  </div>
</template>
