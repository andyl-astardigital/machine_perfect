<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchase Orders — machine_native</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="../../mn/engine.js"></script>
  <script src="../../mn/machine.js"></script>
  <script src="../../mn/scxml.js"></script>
  <script src="../../mn/transforms.js"></script>
  <script src="../../mn/browser.js"></script>
  <style>
    .mn-enter-active,.mn-leave-active{transition:all .25s ease}
    .mn-enter-from{opacity:0;transform:translateY(10px) scale(.98)}
    .mn-leave-to{opacity:0;transform:translateY(-6px) scale(.98)}
  </style>

  <!-- SCXML behaviour definitions -->
  <link rel="mn-machine" href="/examples/purchase-order/machines/session.scxml" />
  <link rel="mn-machine" href="/examples/purchase-order/machines/nav.scxml" />
  <link rel="mn-machine" href="/examples/purchase-order/machines/order-list.scxml" />
  <link rel="mn-machine" href="/examples/purchase-order/machines/director-queue.scxml" />
  <link rel="mn-machine" href="/examples/purchase-order/machines/purchase-order.scxml" />
  <link rel="mn-machine" href="/examples/purchase-order/machines/purchase-order-status.scxml" />
  <link rel="mn-machine" href="/examples/purchase-order/machines/dashboard.scxml" />
  <link rel="mn-machine" href="/examples/purchase-order/machines/toast.scxml" />

  <!-- HTML rendering templates -->
  <link rel="mn-import" href="/examples/purchase-order/machines/session.mn.html" />
  <link rel="mn-import" href="/examples/purchase-order/machines/nav.mn.html" />
  <link rel="mn-import" href="/examples/purchase-order/machines/order-list.mn.html" />
  <link rel="mn-import" href="/examples/purchase-order/machines/director-queue.mn.html" />
  <link rel="mn-import" href="/examples/purchase-order/machines/purchase-order.mn.html" />
  <link rel="mn-import" href="/examples/purchase-order/machines/purchase-order-status.mn.html" />
  <link rel="mn-import" href="/examples/purchase-order/machines/dashboard.mn.html" />
</head>
<body class="bg-base-300 text-base-content min-h-screen">

  <!-- Session store — shared auth state across all machines -->
  <mn-store name="session" value='{"user":null,"token":null}'></mn-store>

  <!-- Session machine — auth state, lives independently, never inside nav -->
  <div mn="session" mn-persist="po-session"></div>

  <!-- Nav machine — browser-only, never leaves the DOM -->
  <div mn="nav"></div>

  <!-- Toast template — inline since it's tiny -->
  <template mn-define="po-toast">
    <div mn-state="idle"></div>
    <div mn-state="show">
      <mn-temporal>(animate)</mn-temporal>
      <div class="alert shadow-lg">
        <mn-class>(cond (= type 'success') 'alert-success' (= type 'error') 'alert-error' true 'alert-info')</mn-class>
        <span class="text-sm"><mn-text>message</mn-text></span>
      </div>
    </div>
  </template>

  <!-- Toast — browser-only notifications -->
  <div class="toast toast-end toast-bottom z-50">
    <div mn="po-toast" mn-ctx='{"message":"","type":"info"}'></div>
  </div>

  <script>
  // Chart.js integration via MachineNative.fn() — the escape hatch.
  // The machine carries the data. This function renders it.
  MachineNative.fn('renderChart', function (canvas, type, data, title) {
    if (!canvas || !canvas.getContext) return null;
    var existing = Chart.getChart(canvas);
    if (existing) existing.destroy();
    return new Chart(canvas, {
      type: type,
      data: {
        labels: data.labels,
        datasets: [{
          data: data.data,
          backgroundColor: data.colors,
          borderWidth: 0
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: type === 'doughnut' ? 'bottom' : 'none', labels: { color: '#a6adbb' } },
          title: { display: !!title, text: title, color: '#a6adbb' }
        },
        scales: type === 'bar' ? {
          y: { beginAtZero: true, ticks: { color: '#a6adbb', stepSize: 1 } },
          x: { ticks: { color: '#a6adbb' } }
        } : {}
      }
    });
  });
  </script>

  <script>MachineNative.init({
    registry: 'http://localhost:3100',
    server: 'http://localhost:4000',
    loading: '<main class="max-w-5xl mx-auto p-6"><div class="flex items-center justify-center py-16"><span class="loading loading-spinner loading-lg"></span></div></main>'
  });</script>

</body>
</html>
