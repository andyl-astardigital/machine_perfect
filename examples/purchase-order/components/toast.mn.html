<!-- toast — Auto-dismissing notification.
     States: idle → show (auto-dismiss after 3s)
     Context: { message, type }
     Listens for mn-receive events from parent. -->
<template mn-define="po-toast">
  <div mn-state="idle"></div>
  <div mn-state="show" class="alert shadow-lg text-sm gap-2">
    <mn-temporal>(after 3000 (to idle))</mn-temporal>
    <mn-class>(cond
      (= type 'success') 'alert-success'
      (= type 'error') 'alert-error'
      (= type 'warning') 'alert-warning'
      true 'alert-info')</mn-class>
    <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <span><mn-text>message</mn-text></span>
    <mn-slot></mn-slot>
  </div>
</template>
