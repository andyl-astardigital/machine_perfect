<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../../logo.svg" />
  <title>machine_native — test suite</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; padding: 20px; background: #4c1d95; color: #e9d5ff; }
    h1 { font-size: 18px; margin-bottom: 4px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .header img { width: 28px; height: 28px; border-radius: 6px; }
    .header h1 { font-size: 18px; }
    .header .gold { color: #fbbf24; }
    #summary { margin-bottom: 16px; padding: 8px 12px; border-radius: 6px; font-weight: bold; }
    .pass-bg { background: #0d3320; color: #4ade80; }
    .fail-bg { background: #3b0d0d; color: #f87171; }
    .result { padding: 4px 8px; border-left: 3px solid; margin-bottom: 2px; border-radius: 0 4px 4px 0; }
    .result.pass { border-color: #22c55e; color: #86efac; }
    .result.fail { border-color: #ef4444; color: #fca5a5; background: #2a0a0a; }
    .result .detail { color: #f87171; font-size: 11px; margin-top: 2px; }
    .group { margin-top: 12px; margin-bottom: 4px; font-weight: bold; color: #fbbf24; font-size: 14px; }
    #fixture-area { position: absolute; left: -9999px; top: -9999px; }
    .mn-enter-active, .mn-leave-active { transition: opacity 0.05s; }
    .mn-enter-from { opacity: 0; }
    .mn-leave-to { opacity: 0; }
  </style>
</head>
<body>
  <div class="header">
    <img src="../../logo.svg" alt="" />
    <h1>machine_native <span class="gold">v0.5</span> — test suite</h1>
  </div>
  <div id="summary">Running...</div>
  <div id="results"></div>
  <div id="fixture-area"></div>
  <script src="../engine.js"></script>
  <script src="../browser.js"></script>
  <script>
    var _tests = [], _g = '', _p = 0, _f = 0;
    var _r = document.getElementById('results'), _fa = document.getElementById('fixture-area');
    function group(n) { _g = n; }
    var _currentTest = null;
    function test(n, fn) { _tests.push({ n: _g + ' > ' + n, fn: fn, perf: '' }); }
    function perf(label, ms) { if (_currentTest) _currentTest.perf += ((_currentTest.perf ? ', ' : '') + label + ': ' + ms.toFixed(1) + 'ms'); }
    function assert(c, m) { if (!c) throw new Error(m || 'Assertion failed'); }
    function eq(a, b, m) { if (a !== b) throw new Error((m||'') + ': ' + JSON.stringify(a) + ' !== ' + JSON.stringify(b)); }
    function has(s, sub) { if (String(s).indexOf(sub) === -1) throw new Error('"' + s + '" missing "' + sub + '"'); }
    function fixture(h) { var d = document.createElement('div'); d.innerHTML = h; _fa.appendChild(d); MachineNative.init(d); return d; }
    function click(e) { e.dispatchEvent(new MouseEvent('click', { bubbles: true })); }
    function type(e, v) { e.value = v; e.dispatchEvent(new Event('input', { bubbles: true })); }
    function check(e, c) { e.checked = c; e.dispatchEvent(new Event('input', { bubbles: true })); }
    function selVal(e, v) { e.value = v; e.dispatchEvent(new Event('change', { bubbles: true })); }
    function submit(f) { f.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true })); }
    function keydown(e, k) { e.dispatchEvent(new KeyboardEvent('keydown', { key: k, bubbles: true })); }
    function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }
    async function run() {
      var lg = '';
      for (var i = 0; i < _tests.length; i++) {
        var t = _tests[i], gn = t.n.split(' > ')[0];
        if (gn !== lg) { var g = document.createElement('div'); g.className = 'group'; g.textContent = gn; _r.appendChild(g); lg = gn; }
        _fa.innerHTML = '';
        _currentTest = t;
        var row = document.createElement('div');
        try { await t.fn(); _p++; row.className = 'result pass'; row.textContent = '\u2713 ' + t.n + (t.perf ? ' (' + t.perf + ')' : ''); }
        catch (e) { _f++; row.className = 'result fail'; row.innerHTML = '\u2717 ' + t.n + '<div class="detail">' + e.message + '</div>'; }
        _r.appendChild(row);
      }
      var s = document.getElementById('summary');
      s.textContent = _p + ' passed, ' + _f + ' failed, ' + (_p + _f) + ' total';
      s.className = _f === 0 ? 'pass-bg' : 'fail-bg';
    }

    // ══════════════════════════════════════════════════════════════════
    //  S-EXPRESSION ENGINE
    // ══════════════════════════════════════════════════════════════════

    group('S-expressions');

    test('bare word resolves to context value', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"x":42}\'><span mn-text="x" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, '42');
    });

    test('dotted path resolves', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"user":{"name":"A"}}\'><span mn-text="user.name" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, 'A');
    });

    test('$state resolves to current state', function () {
      var el = fixture('<div mn="t"><div mn-state="hello"><span mn-text="$state" id="o"></span></div></div>');
      eq(el.querySelector('#o').textContent, 'hello');
    });

    test('(+ a b) arithmetic', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"a":2,"b":3}\'><span id="o"><mn-text>(+ a b)</mn-text></span></div>');
      eq(el.querySelector('#o').textContent, '5');
    });

    test('(str a b) concatenation', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"n":5}\'><span id="o"><mn-text>(str n \' items\')</mn-text></span></div>');
      eq(el.querySelector('#o').textContent, '5 items');
    });

    test('(> a b) comparison', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"n":10}\'><div id="a"><mn-show>(> n 5)</mn-show>Y</div><div id="b"><mn-show>(> n 20)</mn-show>N</div></div>');
      assert(!el.querySelector('#a').hidden, '>5 should show');
      assert(el.querySelector('#b').hidden, '>20 should hide');
    });

    test('(and) (or) (not) logic', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"a":true,"b":false}\'><div id="o"><mn-show>(and a (not b))</mn-show>Y</div></div>');
      assert(!el.querySelector('#o').hidden);
    });

    test('(if cond then else)', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"on":true}\'><span id="o"><mn-text>(if on \'YES\' \'NO\')</mn-text></span></div>');
      eq(el.querySelector('#o').textContent, 'YES');
    });

    test('(when cond value)', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"ok":true}\'><span id="o"><mn-text>(when ok \'good\')</mn-text></span></div>');
      eq(el.querySelector('#o').textContent, 'good');
    });

    test('(count items) collection length', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"items":[1,2,3]}\'><span id="o"><mn-text>(count items)</mn-text></span></div>');
      eq(el.querySelector('#o').textContent, '3');
    });

    test('(set! x val) mutation', function () {
      var el = fixture(
        '<div mn="t" mn-ctx=\'{"x":0}\'>' +
        '<div mn-state="a">' +
        '<mn-transition event="set-x" to="a"><mn-action>(set! x 99)</mn-action></mn-transition>' +
        '<button mn-to="set-x" id="btn">Go</button>' +
        '<span mn-text="x" id="o"></span>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('#o').textContent, '99');
    });

    test('(inc! x) mutation', function () {
      var el = fixture(
        '<div mn="t" mn-ctx=\'{"n":0}\'>' +
        '<div mn-state="a">' +
        '<mn-transition event="increment" to="a"><mn-action>(inc! n)</mn-action></mn-transition>' +
        '<button mn-to="increment" id="btn">+</button>' +
        '<span mn-text="n" id="o"></span>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      click(el.querySelector('#btn'));
      eq(el.querySelector('#o').textContent, '2');
    });

    test('(do expr1 expr2) sequences', function () {
      var el = fixture(
        '<div mn="t" mn-ctx=\'{"a":0,"b":0}\'>' +
        '<div mn-state="s">' +
        '<mn-transition event="set-ab" to="s"><mn-action>(do (set! a 1) (set! b 2))</mn-action></mn-transition>' +
        '<button mn-to="set-ab" id="btn">Go</button>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mn]')._mn.ctx.a, 1);
      eq(el.querySelector('[mn]')._mn.ctx.b, 2);
    });

    test('(push! arr val) array mutation', function () {
      var el = fixture(
        '<div mn="t" mn-ctx=\'{"items":[]}\'>' +
        '<div mn-state="a">' +
        '<mn-transition event="add-item" to="a"><mn-action>(push! items 1)</mn-action></mn-transition>' +
        '<button mn-to="add-item" id="btn">+</button>' +
        '</div></div>'
      );
      click(el.querySelector('#btn')); click(el.querySelector('#btn')); click(el.querySelector('#btn'));
      eq(el.querySelector('[mn]')._mn.ctx.items.length, 3);
    });

    test('(toggle! flag) boolean flip', function () {
      var el = fixture(
        '<div mn="t" mn-ctx=\'{"on":false}\'>' +
        '<div mn-state="a">' +
        '<mn-transition event="toggle-on" to="a"><mn-action>(toggle! on)</mn-action></mn-transition>' +
        '<button mn-to="toggle-on" id="btn">T</button>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mn]')._mn.ctx.on, true);
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mn]')._mn.ctx.on, false);
    });

    test('(fn [x] body) lambda with filter — Clojure arg order', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"items":[1,2,3,4,5]}\'><span id="o"><mn-text>(count (filter (fn [x] (> x 3)) items))</mn-text></span></div>');
      eq(el.querySelector('#o').textContent, '2');
    });

    test('(let [x 1 y 2] (+ x y)) local bindings — Clojure-style', function () {
      var el = fixture('<div mn="t"><span id="o"><mn-text>(let [x 10 y 20] (+ x y))</mn-text></span></div>');
      eq(el.querySelector('#o').textContent, '30');
    });

    test('keyword :name resolves to string', function () {
      var el = fixture(
        '<div mn="t" mn-ctx=\'{"items":[{"id":1},{"id":2}]}\'>' +
        '<div mn-state="a">' +
        '<mn-transition event="remove-one" to="a"><mn-action>(remove-where! items :id 1)</mn-action></mn-transition>' +
        '<button mn-to="remove-one" id="btn">-</button>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mn]')._mn.ctx.items.length, 1);
      eq(el.querySelector('[mn]')._mn.ctx.items[0].id, 2);
    });

    test('(obj :key val) creates object', function () {
      var el = fixture(
        '<div mn="t" mn-ctx=\'{"items":[]}\'>' +
        '<div mn-state="a">' +
        '<mn-transition event="add-obj" to="a"><mn-action>(push! items (obj :name \'test\' :done false))</mn-action></mn-transition>' +
        '<button mn-to="add-obj" id="btn">+</button>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      var item = el.querySelector('[mn]')._mn.ctx.items[0];
      eq(item.name, 'test');
      eq(item.done, false);
    });

    test('nested expressions compose', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"items":[1,2,3]}\'><span id="o"><mn-text>(str (count items) \' of \' (+ (count items) 2))</mn-text></span></div>');
      eq(el.querySelector('#o').textContent, '3 of 5');
    });

    test('#() anonymous function shorthand', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"items":[1,2,3,4,5]}\'><span id="o"><mn-text>(count (filter #(> % 3) items))</mn-text></span></div>');
      eq(el.querySelector('#o').textContent, '2');
    });

    test('(->> x (f) (g)) thread-last macro', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"items":[1,2,3,4,5]}\'><span id="o"><mn-text>(->> items (filter #(> % 2)) (count))</mn-text></span></div>');
      eq(el.querySelector('#o').textContent, '3');
    });

    test('(-> x (f a) (g b)) thread-first macro', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"s":"hello world"}\'><span id="o"><mn-text>(-> s (upper) (trim))</mn-text></span></div>');
      eq(el.querySelector('#o').textContent, 'HELLO WORLD');
    });

    test('[x y z] vector creates array', function () {
      var el = fixture('<div mn="t"><span id="o"><mn-text>(count [1 2 3])</mn-text></span></div>');
      eq(el.querySelector('#o').textContent, '3');
    });

    test('sort-by with key function', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"items":[{"n":3},{"n":1},{"n":2}]}\'><span id="o"><mn-text>(get (first (sort-by #(get % :n) items)) :n)</mn-text></span></div>');
      eq(el.querySelector('#o').textContent, '1');
    });


    // ══════════════════════════════════════════════════════════════════
    //  CORE
    // ══════════════════════════════════════════════════════════════════

    group('Core');

    test('mn creates instance, first state active', function () {
      var el = fixture('<div mn="t"><div mn-state="a" id="a">A</div><div mn-state="b" id="b">B</div></div>');
      assert(el.querySelector('[mn]')._mn);
      assert(!el.querySelector('#a').hidden);
      assert(el.querySelector('#b').hidden);
    });

    test('mn-initial overrides', function () {
      var el = fixture('<div mn="t" mn-initial="b"><div mn-state="a" id="a">A</div><div mn-state="b" id="b">B</div></div>');
      assert(el.querySelector('#a').hidden);
      assert(!el.querySelector('#b').hidden);
    });

    test('mn-ctx sets context', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"n":42}\'><div mn-state="a">A</div></div>');
      eq(el.querySelector('[mn]')._mn.ctx.n, 42);
    });

    test('stateless machine with bindings', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"n":5}\'><span id="o"><mn-text>(* n 2)</mn-text></span></div>');
      eq(el.querySelector('#o').textContent, '10');
    });

    test('mn-ctx attribute syncs with live context after action', function () {
      var el = fixture(
        '<div mn="t" mn-ctx=\'{"count":0}\'>' +
        '<div mn-state="a">' +
        '<mn-transition event="increment" to="a"><mn-action>(inc! count)</mn-action></mn-transition>' +
        '<button mn-to="increment" id="btn">+</button>' +
        '</div></div>'
      );
      var machine = el.querySelector('[mn]');
      eq(JSON.parse(machine.getAttribute('mn-ctx')).count, 0, 'initial');
      click(el.querySelector('#btn'));
      eq(JSON.parse(machine.getAttribute('mn-ctx')).count, 1, 'after click');
      click(el.querySelector('#btn'));
      eq(JSON.parse(machine.getAttribute('mn-ctx')).count, 2, 'after second click');
    });

    test('mn-ctx attribute syncs with mn-model changes', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"name":""}\'><div mn-state="a"><input mn-model="name" id="inp" /></div></div>');
      var machine = el.querySelector('[mn]');
      var input = el.querySelector('#inp');
      input.value = 'Andrew';
      input.dispatchEvent(new Event('input', { bubbles: true }));
      eq(JSON.parse(machine.getAttribute('mn-ctx')).name, 'Andrew');
    });

    test('mn-ctx attribute syncs arrays after push!', function () {
      var el = fixture(
        '<div mn="t" mn-ctx=\'{"items":[]}\'>' +
        '<div mn-state="a">' +
        '<mn-transition event="add-pen" to="a"><mn-action>(push! items (obj :name \'Pen\'))</mn-action></mn-transition>' +
        '<button mn-to="add-pen" id="btn">Add</button>' +
        '</div></div>'
      );
      var machine = el.querySelector('[mn]');
      click(el.querySelector('#btn'));
      var ctx = JSON.parse(machine.getAttribute('mn-ctx'));
      eq(ctx.items.length, 1, 'one item');
      eq(ctx.items[0].name, 'Pen', 'item name');
    });

    test('mn-ctx in outerHTML contains live values after mn-model input', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"title":"","amount":0}\'><div mn-state="a"><input mn-model="title" id="inp" /><input mn-model="amount" type="number" id="amt" /></div></div>');
      var machine = el.querySelector('[mn]');
      var inp = el.querySelector('#inp');
      var amt = el.querySelector('#amt');
      inp.value = 'Test Order';
      inp.dispatchEvent(new Event('input', { bubbles: true }));
      amt.value = '500';
      amt.dispatchEvent(new Event('input', { bubbles: true }));
      // outerHTML should now have the synced values
      var html = machine.outerHTML;
      var ctxMatch = html.match(/mn-ctx="([^"]*)"/);
      assert(ctxMatch, 'outerHTML has mn-ctx');
      var ctx = JSON.parse(ctxMatch[1].replace(/&quot;/g, '"').replace(/&amp;/g, '&'));
      eq(ctx.title, 'Test Order', 'title in outerHTML');
      eq(ctx.amount, '500', 'amount in outerHTML');
    });

    test('mn-ctx sync excludes $ properties', function () {
      var el = fixture(
        '<div mn="t" mn-ctx=\'{"x":1}\'>' +
        '<div mn-state="a">' +
        '<mn-transition event="inc-x" to="a"><mn-action>(inc! x)</mn-action></mn-transition>' +
        '<button mn-to="inc-x" id="btn">+</button>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      var raw = el.querySelector('[mn]').getAttribute('mn-ctx');
      assert(raw.indexOf('$state') === -1, 'no $state in mn-ctx');
      assert(raw.indexOf('$el') === -1, 'no $el in mn-ctx');
      assert(raw.indexOf('$refs') === -1, 'no $refs in mn-ctx');
      assert(raw.indexOf('__mn') === -1, 'no __mn internals in mn-ctx');
    });


    // ══════════════════════════════════════════════════════════════════
    //  TRANSITIONS
    // ══════════════════════════════════════════════════════════════════

    group('Transitions');

    test('mn-to transitions on click', function () {
      var el = fixture('<div mn="t"><div mn-state="a"><button mn-to="b" id="btn">B</button></div><div mn-state="b" id="b">B</div></div>');
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mn]')._mn.state, 'b');
    });

    test('self-transition with action', function () {
      var el = fixture(
        '<div mn="t" mn-ctx=\'{"n":0}\'>' +
        '<div mn-state="a">' +
        '<mn-transition event="increment" to="a"><mn-action>(inc! n)</mn-action></mn-transition>' +
        '<button mn-to="increment" id="btn">+</button>' +
        '<span mn-text="n" id="o"></span>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('#o').textContent, '1');
    });

    test('guard blocks when falsy', function () {
      var el = fixture(
        '<div mn="t" mn-ctx=\'{"ok":false}\'>' +
        '<div mn-state="a">' +
        '<mn-transition event="go" to="b"><mn-guard>(when ok true)</mn-guard></mn-transition>' +
        '<button mn-to="go" id="btn">Go</button>' +
        '</div><div mn-state="b">B</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mn]')._mn.state, 'a');
    });

    test('guard s-expression in mn-to', function () {
      var el = fixture(
        '<div mn="t" mn-ctx=\'{"items":[1,2,3]}\'>' +
        '<div mn-state="a">' +
        '<mn-transition event="go" to="b"><mn-guard>(> (count items) 2)</mn-guard></mn-transition>' +
        '<button mn-to="go" id="btn">Go</button>' +
        '</div><div mn-state="b">B</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mn]')._mn.state, 'b');
    });

    test('action s-expression in mn-to runs', function () {
      var el = fixture(
        '<div mn="t" mn-ctx=\'{"x":0}\'>' +
        '<div mn-state="a">' +
        '<mn-transition event="go" to="b"><mn-action>(set! x 99)</mn-action></mn-transition>' +
        '<button mn-to="go" id="btn">Go</button>' +
        '</div><div mn-state="b">B</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mn]')._mn.ctx.x, 99);
    });

    test('unknown state warns', function () {
      var el = fixture('<div mn="t"><div mn-state="a"><button mn-to="zzz" id="btn">Go</button></div></div>');
      var w = false; var ow = console.warn; console.warn = function () { w = true; };
      click(el.querySelector('#btn')); console.warn = ow;
      eq(el.querySelector('[mn]')._mn.state, 'a');
      assert(w);
    });

    test('mn-state-change event fires', function () {
      var d = null;
      document.addEventListener('mn-state-change', function h(e) { d = e.detail; document.removeEventListener('mn-state-change', h); });
      var el = fixture('<div mn="ev"><div mn-state="a"><button mn-to="b" id="btn">B</button></div><div mn-state="b">B</div></div>');
      click(el.querySelector('#btn'));
      eq(d.prev, 'a'); eq(d.next, 'b');
    });


    // ══════════════════════════════════════════════════════════════════
    //  DATA BINDING
    // ══════════════════════════════════════════════════════════════════

    group('Binding');

    test('mn-text with s-expression', function () {
      var el = fixture('<div mn="t" mn-ctx=\'{"a":2,"b":3}\'><span id="o"><mn-text>(+ a b)</mn-text></span></div>');
      eq(el.querySelector('#o').textContent, '5');
    });

    test('mn-text updates after action', function () {
      var el = fixture(
        '<div mn="t" mn-ctx=\'{"n":0}\'>' +
        '<div mn-state="a">' +
        '<span mn-text="n" id="o"></span>' +
        '<mn-transition event="increment" to="a"><mn-action>(inc! n)</mn-action></mn-transition>' +
        '<button mn-to="increment" id="btn">+</button>' +
        '</div></div>'
      );
      click(el.querySelector('#btn'));
      eq(el.querySelector('#o').textContent, '1');
    });

    test('mn-model input', function () {

    test('M10 — init() re-invocation does not reset already-live store values', function () {
      // Simulate what happens when HTMX swaps in new content and init() is called again.
      // The store was mutated at runtime; the re-init must not restore it to initial value.
      var root = document.createElement('div');
      root.innerHTML = '<mn-store name="m10test" value=\'{"count":0}\'></mn-store>';
      _fa.appendChild(root);
      MachineNative.init(root);
      // Store is initialised to {count:0}
      eq(MachineNative.store.m10test.count, 0, 'M10: store initialised to 0');
      // Simulate runtime mutation
      MachineNative.store.m10test.count = 99;
      eq(MachineNative.store.m10test.count, 99, 'M10: store mutated to 99');
      // Call init() again (as HTMX would after a swap)
      MachineNative.init(root);
      eq(MachineNative.store.m10test.count, 99, 'M10: re-init does not reset store to 0');
    });

    test('Bug 21 — mn-each with duplicate key: items after the duplicate get correct data', function () {
      // If items = [A, A_dup, B] and A_dup is skipped (duplicate key),
      // the update loop must use newMap[key].item not items[i].
      // With items[i], after skipping A_dup, i=1 maps to B but items[1]=A_dup — wrong data.
      var el = fixture(
        '<div mn="bug21" mn-ctx=\'{"items":[{"k":"x","v":"A"},{"k":"y","v":"B"},{"k":"z","v":"C"}]}\'>' +
        '<div mn-state="s">' +
        '<template mn-key="k"><mn-each>items</mn-each>' +
        '<div class="item"><mn-text>v</mn-text></div></template>' +
        '</div></div>'
      );
      var initial = el.querySelectorAll('.item');
      eq(initial[0].textContent, 'A', 'Bug21: initial A');
      eq(initial[1].textContent, 'B', 'Bug21: initial B');
      eq(initial[2].textContent, 'C', 'Bug21: initial C');

      // Update with a duplicate key in the middle: [A, A_dup, B updated, C updated]
      // A_dup (k=x) is a duplicate — skipped. y and z items get new values.
      var inst = el.querySelector('[mn]')._mn;
      inst.ctx.items = [
        { k: 'x', v: 'A' },
        { k: 'x', v: 'A_DUP' }, // duplicate — skipped
        { k: 'y', v: 'B2' },
        { k: 'z', v: 'C2' }
      ];
      inst.update();

      // Three rendered items (duplicate skipped): A, B2, C2
      var updated = el.querySelectorAll('.item');
      eq(updated.length, 3, 'Bug21: 3 items rendered (duplicate skipped)');
      eq(updated[0].textContent, 'A', 'Bug21: first item still A');
      eq(updated[1].textContent, 'B2', 'Bug21: second item is B2 (not corrupted)');
      eq(updated[2].textContent, 'C2', 'Bug21: third item is C2 (not corrupted)');
    });

    test('mn-temporal (animate) leave completes via transitionend event, not just timeout', async function () {
      var el = fixture(
        '<div mn="anim-test" mn-ctx=\'{}\'>' +
        '<div mn-state="a" style="transition: opacity 0.05s">' +

        '<span id="a-content">A</span>' +
        '</div>' +
        '<div mn-state="b"><span id="b-content">B</span></div>' +
        '</div>'
      );
      var inst = el.querySelector('[mn]')._mn;
      eq(inst.state, 'a', 'starts in a');

      inst.to('b');

      // The leave animation adds mn-leave-from, mn-leave-active classes.
      // After the transition completes (via transitionend event), the old
      // state is hidden. Wait for the animation to finish.
      await new Promise(function (resolve) { setTimeout(resolve, 150); });

      eq(inst.state, 'b', 'transitioned to b');
      var aEl = el.querySelector('[mn-state="a"]');
      // After leave animation, the old state should be hidden
      eq(aEl.hidden, true, 'state a hidden after leave animation');
      assert(!aEl.classList.contains('mn-leave-active'), 'leave-active class removed after transition');
    });
