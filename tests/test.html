<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../logo.svg" />
  <title>machine_perfect — test suite</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; padding: 20px; background: #4c1d95; color: #e9d5ff; }
    h1 { font-size: 18px; margin-bottom: 4px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .header img { width: 28px; height: 28px; border-radius: 6px; }
    .header h1 { font-size: 18px; }
    .header .gold { color: #fbbf24; }
    #summary { margin-bottom: 16px; padding: 8px 12px; border-radius: 6px; font-weight: bold; }
    .pass-bg { background: #0d3320; color: #4ade80; }
    .fail-bg { background: #3b0d0d; color: #f87171; }
    .result { padding: 4px 8px; border-left: 3px solid; margin-bottom: 2px; border-radius: 0 4px 4px 0; }
    .result.pass { border-color: #22c55e; color: #86efac; }
    .result.fail { border-color: #ef4444; color: #fca5a5; background: #2a0a0a; }
    .result .detail { color: #f87171; font-size: 11px; margin-top: 2px; }
    .group { margin-top: 12px; margin-bottom: 4px; font-weight: bold; color: #fbbf24; font-size: 14px; }
    #fixture-area { position: absolute; left: -9999px; top: -9999px; }
    .mp-enter-active, .mp-leave-active { transition: opacity 0.05s; }
    .mp-enter-from { opacity: 0; }
    .mp-leave-to { opacity: 0; }
  </style>
</head>
<body>
  <div class="header">
    <img src="../logo.svg" alt="" />
    <h1>machine_perfect <span class="gold">v0.5</span> — test suite</h1>
  </div>
  <div id="summary">Running...</div>
  <div id="results"></div>
  <div id="fixture-area"></div>
  <script src="../src/machine-perfect.js"></script>
  <script>
    var _tests = [], _g = '', _p = 0, _f = 0;
    var _r = document.getElementById('results'), _fa = document.getElementById('fixture-area');
    function group(n) { _g = n; }
    var _currentTest = null;
    function test(n, fn) { _tests.push({ n: _g + ' > ' + n, fn: fn, perf: '' }); }
    function perf(label, ms) { if (_currentTest) _currentTest.perf += ((_currentTest.perf ? ', ' : '') + label + ': ' + ms.toFixed(1) + 'ms'); }
    function assert(c, m) { if (!c) throw new Error(m || 'Assertion failed'); }
    function eq(a, b, m) { if (a !== b) throw new Error((m||'') + ': ' + JSON.stringify(a) + ' !== ' + JSON.stringify(b)); }
    function has(s, sub) { if (String(s).indexOf(sub) === -1) throw new Error('"' + s + '" missing "' + sub + '"'); }
    function fixture(h) { var d = document.createElement('div'); d.innerHTML = h; _fa.appendChild(d); MachinePerfect.init(d); return d; }
    function click(e) { e.dispatchEvent(new MouseEvent('click', { bubbles: true })); }
    function type(e, v) { e.value = v; e.dispatchEvent(new Event('input', { bubbles: true })); }
    function check(e, c) { e.checked = c; e.dispatchEvent(new Event('input', { bubbles: true })); }
    function selVal(e, v) { e.value = v; e.dispatchEvent(new Event('change', { bubbles: true })); }
    function submit(f) { f.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true })); }
    function keydown(e, k) { e.dispatchEvent(new KeyboardEvent('keydown', { key: k, bubbles: true })); }
    function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }
    async function run() {
      var lg = '';
      for (var i = 0; i < _tests.length; i++) {
        var t = _tests[i], gn = t.n.split(' > ')[0];
        if (gn !== lg) { var g = document.createElement('div'); g.className = 'group'; g.textContent = gn; _r.appendChild(g); lg = gn; }
        _fa.innerHTML = '';
        _currentTest = t;
        var row = document.createElement('div');
        try { await t.fn(); _p++; row.className = 'result pass'; row.textContent = '\u2713 ' + t.n + (t.perf ? ' (' + t.perf + ')' : ''); }
        catch (e) { _f++; row.className = 'result fail'; row.innerHTML = '\u2717 ' + t.n + '<div class="detail">' + e.message + '</div>'; }
        _r.appendChild(row);
      }
      var s = document.getElementById('summary');
      s.textContent = _p + ' passed, ' + _f + ' failed, ' + (_p + _f) + ' total';
      s.className = _f === 0 ? 'pass-bg' : 'fail-bg';
    }

    // ══════════════════════════════════════════════════════════════════
    //  S-EXPRESSION ENGINE
    // ══════════════════════════════════════════════════════════════════

    group('S-expressions');

    test('bare word resolves to context value', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"x":42}\'><span mp-text="x" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, '42');
    });

    test('dotted path resolves', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"user":{"name":"A"}}\'><span mp-text="user.name" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, 'A');
    });

    test('$state resolves to current state', function () {
      var el = fixture('<div mp="t"><div mp-state="hello"><span mp-text="$state" id="o"></span></div></div>');
      eq(el.querySelector('#o').textContent, 'hello');
    });

    test('(+ a b) arithmetic', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"a":2,"b":3}\'><span mp-text="(+ a b)" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, '5');
    });

    test('(str a b) concatenation', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"n":5}\'><span mp-text="(str n \' items\')" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, '5 items');
    });

    test('(> a b) comparison', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"n":10}\'><div mp-show="(> n 5)" id="a">Y</div><div mp-show="(> n 20)" id="b">N</div></div>');
      assert(!el.querySelector('#a').hidden, '>5 should show');
      assert(el.querySelector('#b').hidden, '>20 should hide');
    });

    test('(and) (or) (not) logic', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"a":true,"b":false}\'><div mp-show="(and a (not b))" id="o">Y</div></div>');
      assert(!el.querySelector('#o').hidden);
    });

    test('(if cond then else)', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"on":true}\'><span mp-text="(if on \'YES\' \'NO\')" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, 'YES');
    });

    test('(when cond value)', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"ok":true}\'><span mp-text="(when ok \'good\')" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, 'good');
    });

    test('(count items) collection length', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"items":[1,2,3]}\'><span mp-text="(count items)" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, '3');
    });

    test('(set! x val) mutation', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"x":0}\'><div mp-state="a"><button mp-to="." mp-action="(set! x 99)" id="btn">Go</button><span mp-text="x" id="o"></span></div></div>');
      click(el.querySelector('#btn'));
      eq(el.querySelector('#o').textContent, '99');
    });

    test('(inc! x) mutation', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"n":0}\'><div mp-state="a"><button mp-to="." mp-action="(inc! n)" id="btn">+</button><span mp-text="n" id="o"></span></div></div>');
      click(el.querySelector('#btn'));
      click(el.querySelector('#btn'));
      eq(el.querySelector('#o').textContent, '2');
    });

    test('(do expr1 expr2) sequences', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"a":0,"b":0}\'><div mp-state="s"><button mp-to="." mp-action="(do (set! a 1) (set! b 2))" id="btn">Go</button></div></div>');
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.ctx.a, 1);
      eq(el.querySelector('[mp]')._mp.ctx.b, 2);
    });

    test('(push! arr val) array mutation', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"items":[]}\'><div mp-state="a"><button mp-to="." mp-action="(push! items 1)" id="btn">+</button></div></div>');
      click(el.querySelector('#btn')); click(el.querySelector('#btn')); click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.ctx.items.length, 3);
    });

    test('(toggle! flag) boolean flip', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"on":false}\'><div mp-state="a"><button mp-to="." mp-action="(toggle! on)" id="btn">T</button></div></div>');
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.ctx.on, true);
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.ctx.on, false);
    });

    test('(fn [x] body) lambda with filter — Clojure arg order', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"items":[1,2,3,4,5]}\'><span mp-text="(count (filter (fn [x] (> x 3)) items))" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, '2');
    });

    test('(let [x 1 y 2] (+ x y)) local bindings — Clojure-style', function () {
      var el = fixture('<div mp="t"><span mp-text="(let [x 10 y 20] (+ x y))" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, '30');
    });

    test('keyword :name resolves to string', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"items":[{"id":1},{"id":2}]}\'><div mp-state="a"><button mp-to="." mp-action="(remove-where! items :id 1)" id="btn">-</button></div></div>');
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.ctx.items.length, 1);
      eq(el.querySelector('[mp]')._mp.ctx.items[0].id, 2);
    });

    test('(obj :key val) creates object', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"items":[]}\'><div mp-state="a"><button mp-to="." mp-action="(push! items (obj :name \'test\' :done false))" id="btn">+</button></div></div>');
      click(el.querySelector('#btn'));
      var item = el.querySelector('[mp]')._mp.ctx.items[0];
      eq(item.name, 'test');
      eq(item.done, false);
    });

    test('nested expressions compose', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"items":[1,2,3]}\'><span mp-text="(str (count items) \' of \' (+ (count items) 2))" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, '3 of 5');
    });

    test('#() anonymous function shorthand', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"items":[1,2,3,4,5]}\'><span mp-text="(count (filter #(> % 3) items))" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, '2');
    });

    test('(->> x (f) (g)) thread-last macro', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"items":[1,2,3,4,5]}\'><span mp-text="(->> items (filter #(> % 2)) (count))" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, '3');
    });

    test('(-> x (f a) (g b)) thread-first macro', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"s":"hello world"}\'><span mp-text="(-> s (upper) (trim))" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, 'HELLO WORLD');
    });

    test('[x y z] vector creates array', function () {
      var el = fixture('<div mp="t"><span mp-text="(count [1 2 3])" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, '3');
    });

    test('sort-by with key function', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"items":[{"n":3},{"n":1},{"n":2}]}\'><span mp-text="(get (first (sort-by #(get % :n) items)) :n)" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, '1');
    });


    // ══════════════════════════════════════════════════════════════════
    //  CORE
    // ══════════════════════════════════════════════════════════════════

    group('Core');

    test('mp creates instance, first state active', function () {
      var el = fixture('<div mp="t"><div mp-state="a" id="a">A</div><div mp-state="b" id="b">B</div></div>');
      assert(el.querySelector('[mp]')._mp);
      assert(!el.querySelector('#a').hidden);
      assert(el.querySelector('#b').hidden);
    });

    test('mp-initial overrides', function () {
      var el = fixture('<div mp="t" mp-initial="b"><div mp-state="a" id="a">A</div><div mp-state="b" id="b">B</div></div>');
      assert(el.querySelector('#a').hidden);
      assert(!el.querySelector('#b').hidden);
    });

    test('mp-ctx sets context', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"n":42}\'><div mp-state="a">A</div></div>');
      eq(el.querySelector('[mp]')._mp.ctx.n, 42);
    });

    test('stateless machine with bindings', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"n":5}\'><span mp-text="(* n 2)" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, '10');
    });


    // ══════════════════════════════════════════════════════════════════
    //  TRANSITIONS
    // ══════════════════════════════════════════════════════════════════

    group('Transitions');

    test('mp-to transitions on click', function () {
      var el = fixture('<div mp="t"><div mp-state="a"><button mp-to="b" id="btn">B</button></div><div mp-state="b" id="b">B</div></div>');
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.state, 'b');
    });

    test('mp-to="." self-transition with action', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"n":0}\'><div mp-state="a"><button mp-to="." mp-action="(inc! n)" id="btn">+</button><span mp-text="n" id="o"></span></div></div>');
      click(el.querySelector('#btn'));
      eq(el.querySelector('#o').textContent, '1');
    });

    test('mp-guard blocks when falsy', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"ok":false}\'><div mp-state="a"><button mp-to="b" mp-guard="ok" id="btn">Go</button></div><div mp-state="b">B</div></div>');
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.state, 'a');
    });

    test('mp-guard s-expression', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"items":[1,2,3]}\'><div mp-state="a"><button mp-to="b" mp-guard="(> (count items) 2)" id="btn">Go</button></div><div mp-state="b">B</div></div>');
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.state, 'b');
    });

    test('mp-action s-expression runs', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"x":0}\'><div mp-state="a"><button mp-to="b" mp-action="(set! x 99)" id="btn">Go</button></div><div mp-state="b">B</div></div>');
      click(el.querySelector('#btn'));
      eq(el.querySelector('[mp]')._mp.ctx.x, 99);
    });

    test('unknown state warns', function () {
      var el = fixture('<div mp="t"><div mp-state="a"><button mp-to="zzz" id="btn">Go</button></div></div>');
      var w = false; var ow = console.warn; console.warn = function () { w = true; };
      click(el.querySelector('#btn')); console.warn = ow;
      eq(el.querySelector('[mp]')._mp.state, 'a');
      assert(w);
    });

    test('mp:transition event fires', function () {
      var d = null;
      document.addEventListener('mp:transition', function h(e) { d = e.detail; document.removeEventListener('mp:transition', h); });
      var el = fixture('<div mp="ev"><div mp-state="a"><button mp-to="b" id="btn">B</button></div><div mp-state="b">B</div></div>');
      click(el.querySelector('#btn'));
      eq(d.prev, 'a'); eq(d.next, 'b');
    });


    // ══════════════════════════════════════════════════════════════════
    //  DATA BINDING
    // ══════════════════════════════════════════════════════════════════

    group('Binding');

    test('mp-text with s-expression', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"a":2,"b":3}\'><span mp-text="(+ a b)" id="o"></span></div>');
      eq(el.querySelector('#o').textContent, '5');
    });

    test('mp-text updates after action', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"n":0}\'><div mp-state="a"><span mp-text="n" id="o"></span><button mp-to="." mp-action="(inc! n)" id="btn">+</button></div></div>');
      click(el.querySelector('#btn'));
      eq(el.querySelector('#o').textContent, '1');
    });

    test('mp-model input', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"v":""}\'><div mp-state="a"><input mp-model="v" id="i" /><span mp-text="v" id="o"></span></div></div>');
      type(el.querySelector('#i'), 'hello');
      eq(el.querySelector('#o').textContent, 'hello');
    });

    test('mp-model checkbox', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"on":false}\'><div mp-state="a"><input type="checkbox" mp-model="on" id="cb" /></div></div>');
      check(el.querySelector('#cb'), true);
      eq(el.querySelector('[mp]')._mp.ctx.on, true);
    });

    test('mp-model select', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"c":"a"}\'><div mp-state="s"><select mp-model="c" id="sel"><option value="a">A</option><option value="b">B</option></select></div></div>');
      selVal(el.querySelector('#sel'), 'b');
      eq(el.querySelector('[mp]')._mp.ctx.c, 'b');
    });

    test('mp-show s-expression', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"n":10}\'><div mp-show="(> n 5)" id="o">Y</div></div>');
      assert(!el.querySelector('#o').hidden);
    });

    test('mp-hide', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"gone":true}\'><div mp-hide="gone" id="o">X</div></div>');
      assert(el.querySelector('#o').hidden);
    });


    // ══════════════════════════════════════════════════════════════════
    //  mp-class (PURE S-EXPRESSIONS)
    // ══════════════════════════════════════════════════════════════════

    group('mp-class');

    test('(when expr cls) adds class', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"done":true}\'><div mp-state="a"><span mp-class="(when done \'line-through\')" id="o">X</span></div></div>');
      assert(el.querySelector('#o').classList.contains('line-through'));
    });

    test('(when false cls) does not add class', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"done":false}\'><div mp-state="a"><span mp-class="(when done \'line-through\')" id="o">X</span></div></div>');
      assert(!el.querySelector('#o').classList.contains('line-through'));
    });

    test('(when-state name cls) adds class in matching state', function () {
      var el = fixture('<div mp="t"><div mp-state="active"><span mp-class="(when-state active \'ring\')" id="o">X</span></div></div>');
      assert(el.querySelector('#o').classList.contains('ring'));
    });

    test('multiple class expressions', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"done":true,"urgent":false}\'><div mp-state="a"><span mp-class="(when done \'line-through\') (when urgent \'text-red\')" id="o">X</span></div></div>');
      assert(el.querySelector('#o').classList.contains('line-through'));
      assert(!el.querySelector('#o').classList.contains('text-red'));
    });

    test('(if cond cls1 cls2) conditional class', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"active":true}\'><div mp-state="a"><span mp-class="(if active \'bg-green\' \'bg-gray\')" id="o">X</span></div></div>');
      assert(el.querySelector('#o').classList.contains('bg-green'));
      assert(!el.querySelector('#o').classList.contains('bg-gray'));
    });

    test('class removed when expression becomes falsy', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"on":true}\'><div mp-state="a"><span mp-class="(when on \'active\')" id="o">X</span><button mp-to="." mp-action="(set! on false)" id="btn">Off</button></div></div>');
      assert(el.querySelector('#o').classList.contains('active'));
      click(el.querySelector('#btn'));
      assert(!el.querySelector('#o').classList.contains('active'));
    });

    test('complex expression in mp-class', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"items":[1,2,3]}\'><div mp-state="a"><span mp-class="(when (> (count items) 2) \'has-many\')" id="o">X</span></div></div>');
      assert(el.querySelector('#o').classList.contains('has-many'));
    });


    // ══════════════════════════════════════════════════════════════════
    //  ATTRIBUTE BINDING
    // ══════════════════════════════════════════════════════════════════

    group('Bind');

    test('mp-bind-disabled boolean', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"locked":true}\'><div mp-state="a"><button mp-bind-disabled="locked" id="btn">Go</button></div></div>');
      assert(el.querySelector('#btn').hasAttribute('disabled'));
    });

    test('mp-bind-disabled with s-expression', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"ok":false}\'><div mp-state="a"><button mp-bind-disabled="(not ok)" id="btn">Go</button></div></div>');
      assert(el.querySelector('#btn').hasAttribute('disabled'));
    });

    test('mp-bind-href', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"url":"/page"}\'><div mp-state="a"><a mp-bind-href="url" id="l">L</a></div></div>');
      eq(el.querySelector('#l').getAttribute('href'), '/page');
    });

    test('mp-bind on machine element', function () {
      var el = fixture('<div mp="t" mp-ctx=\'{"t":"dark"}\' mp-bind-data-theme="t"><div mp-state="a">A</div></div>');
      eq(el.querySelector('[mp]').getAttribute('data-theme'), 'dark');
    });


    // ══════════════════════════════════════════════════════════════════
    //  DOM EVENTS
    // ══════════════════════════════════════════════════════════════════

    group('Events');

    test('mp-on:keydown s-expression with (to)', function () {
      var el = fixture('<div mp="t"><div mp-state="a"><input mp-on:keydown="(when (= (get $event :key) \'Enter\') (to b))" id="i" /></div><div mp-state="b">B</div></div>');
      keydown(el.querySelector('#i'), 'Enter');
      eq(el.querySelector('[mp]')._mp.state, 'b');
    });

    test('s-expression event handler filters non-matching keys', function () {
      var el = fixture('<div mp="t"><div mp-state="a"><input mp-on:keydown="(when (= (get $event :key) \'Enter\') (to b))" id="i" /></div><div mp-state="b">B</div></div>');
      keydown(el.querySelector('#i'), 'a');
      eq(el.querySelector('[mp]')._mp.state, 'a');
    });

    test('s-expression event with Escape', function () {

    test('keyed mp-each reorder does not destroy nested machines via MutationObserver', async function () {
      // Regression: insertBefore in keyed reconciliation triggers MutationObserver
      // removedNodes, which called _cleanupInstance (deleting _mp) on nested machines.
      // The observer re-created them from stale mp-ctx. The fix: skip cleanup for
      // nodes that are still connected (moved, not removed).
      MachinePerfect.templates['async-card'] = (function () {
        var t = document.createElement('template');
        t.setAttribute('mp-define', 'async-card');
        t.innerHTML = '<div mp-state="d"><span mp-text="name" class="an"></span><span mp-text="(or img \'no\')" class="ai"></span></div>';
        return t;
      })();

      var el = fixture(
        '<div>' +
        '<mp-store name="async-r" value=\'[{"name":"X","img":""},{"name":"Y","img":""}]\'></mp-store>' +
        '<div mp="aapp"><div mp-state="s">' +
        '<template mp-each="$store.async-r" mp-key="name"><div class="aw"><div mp="async-card"></div></div></template>' +
        '</div></div></div>'
      );

      // Cards rendered with initial data
      eq(el.querySelectorAll('.an').length, 2);
      eq(el.querySelectorAll('.ai')[0].textContent, 'no');

      // Simulate async fetch arriving after a delay (like in the real SPA)
      await sleep(50);
      MachinePerfect.store['async-r'][0].img = 'photo.jpg';
      el.querySelector('[mp="aapp"]')._mp.update();

      await sleep(10);
      eq(el.querySelectorAll('.ai')[0].textContent, 'photo.jpg', 'Async update should propagate to nested machine');

      delete MachinePerfect.templates['async-card'];
    });

      for (var i = 0; i < 1000; i++) items.push({id: i, label: 'Item ' + i});
      var el = fixture(
        '<div><mp-store name="perf6" value=\'' + JSON.stringify(items) + '\'></mp-store>' +
        '<div mp="p6"><div mp-state="s">' +
        '<template mp-each="$store.perf6" mp-key="id"><span mp-text="label" class="pl6"></span></template>' +
        '</div></div></div>'
      );
      eq(el.querySelectorAll('.pl6').length, 1000);

      var t0 = performance.now();
      for (var i = 1000; i < 2000; i++) MachinePerfect.store.perf6.push({id: i, label: 'Item ' + i});
      el.querySelector('[mp="p6"]')._mp.update();
      var time = performance.now() - t0;

      eq(el.querySelectorAll('.pl6').length, 2000);
      eq(el.querySelectorAll('.pl6')[1999].textContent, 'Item 1999');

      perf('append 1000', time);
      // Target: under 200ms — existing rows should not be touched
      assert(time < 200, 'Append should be under 200ms, got ' + time.toFixed(1));
    });


    // ── Run ──
    run();
  </script>
